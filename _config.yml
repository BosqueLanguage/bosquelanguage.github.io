theme: minima

title: Bosque Language Blog
author: Mark Marron
email: marron@cs.uky.edu
#url: maybe later

timezone: Etc/UTC # GitHub uses UTC. This is to force dev environment to match
future: false # GitHub Pages will publish future posts if this isn't set to false

description: >
  A blog for musings on Bosque.

# Minima variables
twitter_username:  @BosqueLanguage
github_username:   BosqueLanguage

show_excerpts: true

# Used by simple links page
social-links:
  GitHub:          https://github.com/BosqueLanguage
  Twitter:         https://x.com/BosqueLanguage

# plugin: jekyll-titles-from-headings
titles_from_headings:
  strip_title: true

header_pages:
  - papers.html
  - talks.html
  - resources.md

plugins:
  - jekyll-feed
  - jekyll-sitemap

code_block_max_height: 500px

home_post_limit: 5
